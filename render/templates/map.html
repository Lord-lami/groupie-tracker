<table class="{{.Name}}">
    <thead>
        <tr class="keys">
            {{- range .Value.Keys}}
            <th scope="col">
                {{.}}
            </th>
            {{end}}
        </tr>
    </thead>
    <tbody>
        <tr class="values">
            {{- range .Value.Values}}
            <td>
                {{.}}
            </td>
            {{end}}
        </tr>
    </tbody>
</table>
